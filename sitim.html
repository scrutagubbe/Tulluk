  const imageUrls = [

    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-2d6e7b0b-c819-4424-bc3c-eb6434add568.png',
    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-e41d324c-aa5f-404a-a2b5-7ef12226db5e.png',
    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-3c893e86-4e28-4c0a-99aa-c24e33186b19.png',
    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-001961fb-a7bd-4e8d-9c0d-7693e7e2d5aa.png',
    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-1ca02d64-af87-4523-b24d-8d389ee8c126.png',
    'https://i-p.rmcdn.net/676ad8316154d57dbb7c788d/5185204/image-6cd76fd8-987d-4d39-852e-2b30004c7163.png',
  ];
  const maxImages = 10;
  let currentImages = 0;
  const fallingImages = [];
  const usedIndexes = new Set();
  function getRandomImage() {
    if (usedIndexes.size >= imageUrls.length) {
      usedIndexes.clear();
    }
    let index;
    do {
      index = Math.floor(Math.random() * imageUrls.length);
    } while (usedIndexes.has(index));
    usedIndexes.add(index);
    return imageUrls[index];
  }
  function createFallingImage() {
    if (currentImages >= maxImages) return;
    const img = document.createElement('img');
    img.src = getRandomImage();
    img.classList.add('falling-image');
    img.style.left = Math.random() * window.innerWidth + 'px';
    img.style.top = '-100px';
    let velocityY = Math.random() * 3 + 1;
    img.addEventListener('mousedown', (event) => {
      event.preventDefault();
      img.classList.add('grabbing');
      let offsetX = event.clientX - img.offsetLeft;
      let offsetY = event.clientY - img.offsetTop;
      function onMouseMove(e) {
        img.style.left = e.clientX - offsetX + 'px';
        img.style.top = e.clientY - offsetY + 'px';
        velocityY = 0;
      }
      function onMouseUp() {
        img.classList.remove('grabbing');
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
      }
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
    container.appendChild(img);
    fallingImages.push({ img, velocityY });
    currentImages++;
    function fall() {
      const rect = img.getBoundingClientRect();
      let onGround = false;
      fallingImages.forEach((other) => {
        if (other.img !== img) {
          const otherRect = other.img.getBoundingClientRect();
          if (
            rect.left < otherRect.right &&
            rect.right > otherRect.left &&
            rect.bottom > otherRect.top &&
            rect.top < otherRect.bottom
          ) {
            if (rect.bottom <= otherRect.top + 5) {
              velocityY = 0;
              img.style.top = otherRect.top - rect.height + 'px';
              onGround = true;
            }
          }
        }
      });
      if (!onGround && rect.top + rect.height < window.innerHeight) {
        img.style.top = rect.top + velocityY + 'px';
        velocityY += 0.1;
      } else if (rect.top + rect.height >= window.innerHeight) {
        velocityY = 0;
        img.style.top = window.innerHeight - rect.height + 'px';
        onGround = true;
      }
      if (rect.top > window.innerHeight + 200) {
        img.remove();
        const index = fallingImages.findIndex((obj) => obj.img === img);
        if (index > -1) fallingImages.splice(index, 1);
        currentImages--;
        return;
      }
      requestAnimationFrame(fall);
    }
    fall();
  }
  setInterval(createFallingImage, 1000); </script>
